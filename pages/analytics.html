<!-- ════════════════════════════════════════
     SubTrack · Analytics Page
     ════════════════════════════════════════ -->
<div class="page" id="page-analytics">
  <div class="page-content">

    <!-- Period switch -->
    <div class="period-switch">
      <button class="period-btn active" data-period="monthly" onclick="Analytics.setPeriod('monthly')">Mensuel</button>
      <button class="period-btn"        data-period="yearly"  onclick="Analytics.setPeriod('yearly')">Annuel</button>
    </div>

    <!-- KPI summary -->
    <div class="stats-grid" id="analyticsKPIs"></div>

    <!-- Bar chart -->
    <div class="card" style="margin-bottom:var(--sp-4)">
      <div class="section-title" id="analyticsChartTitle">Dépenses par catégorie</div>
      <div style="margin-top:var(--sp-4)" id="analyticsChart"></div>
    </div>

    <!-- Top subscriptions -->
    <div class="card" style="margin-bottom:var(--sp-4)">
      <div class="section-title">🏆 Top abonnements</div>
      <div style="margin-top:var(--sp-3)" id="analyticsTopSubs"></div>
    </div>

    <!-- Mini stats grid -->
    <div class="stats-grid" id="analyticsMiniStats"></div>

  </div>
</div>
