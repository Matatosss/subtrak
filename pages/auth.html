<!-- ════════════════════════════════════════
     SubTrack · Auth Screen
     ════════════════════════════════════════ -->
<div id="screen-auth" class="screen">
  <div class="auth-screen">

    <!-- Background glows -->
    <div class="auth-bg-glow top"></div>
    <div class="auth-bg-glow bottom"></div>

    <div class="auth-content">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">💳</div>
        <div class="auth-logo-text">Sub<em>Track</em></div>
      </div>

      <!-- Headline -->
      <h1 class="auth-headline">Maîtrisez<br>vos abonnements.</h1>
      <p class="auth-desc">
        Centralisez tous vos abonnements, anticipez vos renouvellements
        et gardez le contrôle de vos dépenses.
      </p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login"    onclick="Auth.switchTab('login')">Connexion</button>
        <button class="auth-tab"        data-tab="register" onclick="Auth.switchTab('register')">Inscription</button>
      </div>

      <!-- ── Login form ── -->
      <div id="form-login">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input class="form-input" type="email" id="loginEmail"
                 placeholder="vous@exemple.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Mot de passe</label>
          <input class="form-input" type="password" id="loginPassword"
                 placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="form-error" id="loginError"></div>
        <button class="btn btn-primary" onclick="Auth.login()" style="margin-top:8px">
          Connexion →
        </button>

        <div class="auth-divider">
          Pas encore de compte ?
          <span class="demo-link" onclick="Auth.loginDemo()">Essayer la démo</span>
        </div>
      </div>

      <!-- ── Register form ── -->
      <div id="form-register" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="regFirst">Prénom</label>
            <input class="form-input" type="text" id="regFirst" placeholder="Alice" autocomplete="given-name">
          </div>
          <div class="form-group">
            <label class="form-label" for="regLast">Nom</label>
            <input class="form-input" type="text" id="regLast" placeholder="Martin" autocomplete="family-name">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <input class="form-input" type="email" id="regEmail"
                 placeholder="vous@exemple.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Mot de passe</label>
          <input class="form-input" type="password" id="regPassword"
                 placeholder="6 caractères minimum" autocomplete="new-password">
        </div>
        <div class="form-error" id="regError"></div>
        <button class="btn btn-primary" onclick="Auth.register()" style="margin-top:8px">
          Créer mon compte →
        </button>
      </div>

    </div>
  </div>
</div>
